<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0b0f17;
      color: #eaeaea;
      font-family: "Rajdhani", sans-serif;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== TOPBAR ===== */
    .topbar {
      position: sticky;
      top: 0;
      width: 100%;
      background: rgba(11, 15, 23, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1f2937;
      z-index: 999;
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1040px;
      margin: 0 auto;
      padding: 14px 24px;
    }

    .brand,
    .brand:visited,
    .brand:active {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #eaeaea;
      font-weight: 600;
    }

    .brand img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .contact {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .contact a,
    .contact a:visited,
    .contact a:active {
      font-size: 13px;
      color: #9aa4b2;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .contact a:hover {
      color: #ffffff;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav a,
    .nav a:visited,
    .nav a:active {
      position: relative;
      font-size: 13px;
      color: #d1d5db;
      text-decoration: none;
      opacity: 0.85;
      transition: 0.2s ease;
    }

    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0%;
      height: 1px;
      background: #3b82f6;
      transition: width 0.25s ease;
    }

    .nav a:hover {
      color: #ffffff;
      opacity: 1;
    }

    .nav a:hover::after {
      width: 100%;
    }

    @media (max-width: 768px) {
      .topbar-inner {
        flex-direction: column;
        gap: 12px;
      }

      .topbar-right {
        flex-direction: column;
        gap: 10px;
      }

      .contact,
      .nav {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <!-- GLOBAL HEADER -->
  <div class="topbar">
    <div class="topbar-inner">

      <a href="{{ '/index.html' | relative_url }}" class="brand">
        <img src="{{ '/dev-logo.jpg' | relative_url }}" alt="Dev With Dev Logo">
        <span>Dev With Dev</span>
      </a>

      <div class="topbar-right">

        <div class="contact">
          <a href="mailto:devrajssingh@yahoo.com">Email</a>
          <a href="https://www.linkedin.com/in/devraj-singh-b62971261" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          <a href="https://devidog34.itch.io/" target="_blank" rel="noopener noreferrer">Itch.io</a>
        </div>

        <div class="nav">
          <a href="{{ '/level-design.html' | relative_url }}">Level Design</a>
          <a href="{{ '/cinematic-design.html' | relative_url }}">Cinematic Design</a>
          <a href="{{ '/about.html' | relative_url }}">About</a>
        </div>

      </div>

    </div>
  </div>

  {{ content }}

</body>
</html>
