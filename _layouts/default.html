<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0b0f17;
      color: #eaeaea;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      position: sticky;
      top: 0;
      width: 100%;
      background: rgba(11, 15, 23, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1f2937;
      z-index: 999;
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1040px;
      margin: 0 auto;
      padding: 14px 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .brand img {
      width: 32px;
      height: 32px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .contact a {
      margin: 0 6px;
      font-size: 13px;
      color: #9aa4b2;
      text-decoration: none;
    }

    .contact a:hover {
      color: #ffffff;
    }

    .nav a {
      margin-left: 16px;
      font-size: 13px;
      color: #ffffff;
      text-decoration: none;
      opacity: 0.8;
    }

    .nav a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <!-- GLOBAL HEADER -->
  <div class="topbar">
    <div class="topbar-inner">

      <a href="./index.html" class="brand">
        <img src="/dev-logo.jpg">
        <span>Dev With Dev</span>
      </a>

      <div class="topbar-right">

        <div class="contact">
          <a href="mailto:devrajssingh@yahoo.com">Email</a>
          <a href="https://www.linkedin.com/in/devraj-singh-b62971261" target="_blank">LinkedIn</a>
          <a href="https://devidog34.itch.io/" target="_blank">Itch.io</a>
        </div>

        <div class="nav">
          <a href="/about.html">About</a>
          <a href="/level-design.html">Level Design</a>
          <a href="/cinematic-design.html">Cinematic</a>
        </div>

      </div>

    </div>
  </div>

  <!-- PAGE CONTENT -->
  {{ content }}

</body>
</html>
